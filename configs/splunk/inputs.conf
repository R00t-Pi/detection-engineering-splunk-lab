########################################
# Universal Forwarder — inputs.conf
# Host: WIN10-01
# Lab: Splunk Detection Engineering Lab
# Version: 1.0
########################################

########################################
# Global defaults
########################################
[WinEventLog]
renderXml = true
suppress_keywords = true
suppress_opcode = true
suppress_sourcename = true
suppress_task = true
suppress_text = true
suppress_type = true
start_from = oldest
current_only = 0
checkpointInterval = 5

########################################
# Windows Security Log
########################################
[WinEventLog://Security]
disabled = false
index = wineventlog

# Phase 1: collecting the full Security log unfiltered.
# renderXml = true is set globally above, which means EventID-based
# whitelist/blacklist (e.g. "whitelist = 4624,4625,...") does NOT work —
# it silently fails and lets everything through with no error. Filtering
# XML-rendered events requires $XmlRegex syntax instead, e.g.:
#   whitelist = $XmlRegex="<EventID>(4624|4625|4688|4697|4698|4719)<\/EventID>"
# Not writing that regex yet — it should be built from actual observed
# event volume in Splunk, not guessed in advance. Revisit in the tuning
# phase once Atomic Red Team activity has generated real telemetry.

########################################
# Windows System Log
########################################
[WinEventLog://System]
disabled = false
index = wineventlog

# Phase 1: collecting unfiltered to establish a telemetry baseline.
# Primary interest here is service creation (7045) and service state
# changes (7040) for persistence detection (T1547). Filtering decisions
# come after observing actual volume, same as Security above.

########################################
# Windows Application Log
########################################
[WinEventLog://Application]
disabled = false
index = wineventlog

# Phase 1: collected unfiltered. Low detection value expected — kept
# broad for now to see what's actually generated before deciding what
# (if anything) is worth cutting.

########################################
# Sysmon Operational
########################################
[WinEventLog://Microsoft-Windows-Sysmon/Operational]
disabled = false
index = sysmon

########################################
# PowerShell Operational
########################################
[WinEventLog://Microsoft-Windows-PowerShell/Operational]
disabled = false
index = powershell

# Carries 4103 (module logging) and 4104 (script block logging) —
# primary source for PowerShell-based detections (T1059.001).

########################################
# Windows PowerShell (Legacy)
########################################
[WinEventLog://Windows PowerShell]
disabled = false
index = powershell

# Legacy channel (events 400/800) — pipeline execution context only,
# no script block content. Collected alongside Operational because some
# tooling still logs exclusively through this channel rather than the
# newer one.